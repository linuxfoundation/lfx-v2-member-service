    /members/{member_id}/memberships/{id}:
        get:
            tags:
                - membership-service
            summary: get-member-membership membership-service
            description: Get a specific membership for a member
            operationId: membership-service#get-member-membership
            parameters:
                - name: v
                  in: query
                  description: Version of the API
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Version of the API
                    example: "1"
                    enum:
                        - "1"
                  example: "1"
                - name: member_id
                  in: path
                  description: Member UID
                  required: true
                  schema:
                    type: string
                    description: Member UID
                    example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    format: uuid
                  example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                - name: id
                  in: path
                  description: Membership UID
                  required: true
                  schema:
                    type: string
                    description: Membership UID
                    example: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
                    format: uuid
                  example: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
            responses:
                "200":
                    description: OK response.
                    headers:
                        ETag:
                            description: ETag header value
                            schema:
                                type: string
                                description: ETag header value
                                example: "123"
                            example: "123"
                    content:
                        application/json:
                            schema:
